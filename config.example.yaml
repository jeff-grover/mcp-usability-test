llm:
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"
  model: "gemma-4-e4b-it"
  # Omit temperature / reasoning_effort to let model_profiles apply.
  # Anything set here overrides the matching profile.
  max_tokens: 2048
  timeout_seconds: 120
  max_retries: 3
  retry_delay_seconds: 5.0
  # Optional sampler knobs — omit to use model/server defaults.
  # top_p: 1.0
  # frequency_penalty: 0.3    # breaks "@@@@" repetition loops on gpt-oss
  # presence_penalty: 0.0
  # min_p: 0.05               # LM Studio extension; trims pathological tail tokens
  # degeneration_char_threshold: 40  # 0 disables repeat-char detection

# Per-model defaults selected by substring match against llm.model.
# Longest matching key wins. Explicit llm.<key> entries above still
# override the profile, so you can temporarily tweak without editing.
model_profiles:
  gemma:
    temperature: 0.7
  mistral:
    temperature: 0.3           # stricter template, lower temp for tool-calling
  gpt-oss:
    temperature: 1.0           # OpenAI's recommended sampler for gpt-oss
    top_p: 1.0
    min_p: 0.05                # trims the tail where "@@@" degeneration lives
    frequency_penalty: 0.3     # additional insurance against repetition loops
    reasoning_effort: "high"   # better tool selection on agentic loops
  qwen:
    temperature: 0.7           # Qwen3 non-thinking default (publisher rec.)
    system_prompt_suffix: "/no_think"  # disables Qwen3 thinking mode
  glm:
    temperature: 0.6           # Zhipu's GLM-4.x recommendation

mcp_server:
  transport: "streamable_http"       # "streamable_http" or "sse"
  url: "https://mcp.example.com/mcp" # adjust to your server's URL
  timeout: 30.0
  oauth:
    enabled: true                    # set to false to skip OAuth
    callback_port: 8100              # local port for OAuth redirect
    scopes: ""                       # space-separated scopes (empty = server default)
    token_file: "state/oauth_tokens.json"  # persisted across restarts

orchestrator:
  max_tool_iterations: 10       # max tool calls per user turn
  observation_interval: 3       # tester observes every N rounds
  context_window_size: 60       # messages kept in sliding window
  max_context_tokens: 100000    # token budget per LLM call
  result_truncation: 8000       # max chars per tool result

scenarios:
  # Core analysis workflows (eval_goals-based)
  - scenarios/ab_test_analysis.yaml
  - scenarios/lift_drivers.yaml
  - scenarios/result_interpretation.yaml
  - scenarios/rollout_planning.yaml
  - scenarios/store_availability.yaml
  - scenarios/rollout_analysis.yaml
  - scenarios/stakeholder_report.yaml
  - scenarios/portfolio_monitoring.yaml
  - scenarios/lift_explorer_deep_dive.yaml
  - scenarios/product_keyword_search.yaml
  - scenarios/store_lookup_by_id.yaml
  - scenarios/cross_client_analysis.yaml
  - scenarios/rollout_prediction.yaml
  # General exploration (goals-based, no eval tracking)
  - scenarios/basic_exploration.yaml
  - scenarios/store_comparison.yaml
  - scenarios/error_recovery.yaml

output:
  observations_dir: "observations"
  state_dir: "state"

# Exploration-mode dimensions — the semantic axes of the MCP server's domain
# that the Tester should systematically probe. Each round, one dimension is
# active and acts as the "subject" of the probe while the phase state machine
# (Coverage / Combinations / EdgeCases / Depth) controls the "type" of probe.
# This list is only used in free-exploration mode (--explore). You can also
# point this key at a YAML file path for external management.
exploration_dimensions:
  - name: Clients
    description: Probe tools that filter, scope, or group by client.
  - name: Products/Categories
    description: Exercise product- and category-level filters and rollups.
  - name: Site tags
    description: Probe tools that slice by site tags, regions, or store groupings.
  - name: Time
    description: Try varied time ranges, granularities, comparisons, and boundaries.
  - name: Tests
    description: Exercise A/B test discovery, summary, and analysis tools.
  - name: Custom charts
    description: Build and query custom chart configurations.
  - name: Lift explorers
    description: Exercise lift-explorer tools with varied segments.
  - name: Rollout analyses
    description: Exercise rollout-analysis tools across different rollouts.
