llm:
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"
  model: "gemma-4-e4b-it"
  temperature: 0.7
  max_tokens: 2048
  timeout_seconds: 120
  max_retries: 3
  retry_delay_seconds: 5.0

mcp_server:
  transport: "streamable_http"       # "streamable_http" or "sse"
  url: "http://localhost/mcp"        # adjust to your server's URL
  timeout: 30.0
  oauth:
    enabled: true                    # set to false to skip OAuth
    callback_port: 8100              # local port for OAuth redirect
    scopes: ""                       # space-separated scopes (empty = server default)
    token_file: "state/oauth_tokens.json"  # persisted across restarts

orchestrator:
  max_tool_iterations: 10       # max tool calls per user turn
  observation_interval: 3       # tester observes every N rounds
  context_window_size: 60       # messages kept in sliding window
  max_context_tokens: 100000    # token budget per LLM call
  result_truncation: 8000       # max chars per tool result

scenarios:
  # Core analysis workflows (eval_goals-based)
  - scenarios/ab_test_analysis.yaml
  - scenarios/lift_drivers.yaml
  - scenarios/result_interpretation.yaml
  - scenarios/rollout_planning.yaml
  - scenarios/store_availability.yaml
  - scenarios/rollout_analysis.yaml
  - scenarios/stakeholder_report.yaml
  - scenarios/portfolio_monitoring.yaml
  # General exploration (goals-based, no eval tracking)
  - scenarios/basic_exploration.yaml
  - scenarios/store_comparison.yaml
  - scenarios/error_recovery.yaml

output:
  observations_dir: "observations"
  state_dir: "state"
